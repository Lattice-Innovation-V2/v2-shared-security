# Test configuration for Latticepay Security Integration Tests

# Disable GCP service auth in tests (no real credentials available)
latticepay.security.gcp-service-auth.enabled=false

# Disable forwarded auth in tests
latticepay.security.forwarded-auth.enabled=false

# IAP tenant (disabled for tests, but provide minimal config to avoid validation errors)
latticepay.security.iap.enabled=false
# latticepay.security.iap.client-id=test-iap-client-id

# GCIP tenant (disabled for tests)
latticepay.security.gcip.enabled=false
# latticepay.security.gcip.project-id=test-project-id

# Set test profile
quarkus.profile=test

# Redis (quarkus-redis-client pulls in dev services; use dev services in tests)
quarkus.redis.devservices.enabled=true
