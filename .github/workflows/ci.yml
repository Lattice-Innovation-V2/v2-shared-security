name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'runtime/**'
      - 'deployment/**'
      - 'integration-tests/**'
      - 'pom.xml'
      - '**/pom.xml'
      - '.github/workflows/ci.yml'
  push:
    branches: [main]
    paths:
      - 'runtime/**'
      - 'deployment/**'
      - 'integration-tests/**'
      - 'pom.xml'
      - '**/pom.xml'
      - '.github/workflows/ci.yml'

jobs:
  test:
    name: Build, Test & Quality Gate
    uses: latticeorg/.github/.github/workflows/java-build-test-gate.yml@main
    with:
      java_version: '25'
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
